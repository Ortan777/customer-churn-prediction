version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - ./backend/models:/app/models
      - ./backend/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      # Uncomment and set these for S3 model storage:
      # - BUCKET_NAME=your-bucket-name
      # - AWS_REGION=us-east-1
      # - AWS_ACCESS_KEY=your-key
      # - AWS_SECRET_KEY=your-secret

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
